name: Backend CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
        env:
          APP_ENV: development
          DEBUG: "true"
          RESEND_API_KEY: ${{ secrets.DEV_RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEV_SUPABASE_KEY }}
          CEO_EMAIL: ${{ secrets.DEV_CEO_EMAIL }}
          ALLOWED_ORIGINS: '["http://localhost:3000"]'

  migrate:
    name: Push Migrations
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only runs on direct push to master — never on pull requests.
    # This prevents touching the production DB from unreviewed branches.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
