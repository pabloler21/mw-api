name: Backend CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
        env:
          APP_ENV: development
          DEBUG: "true"
          RESEND_API_KEY: ${{ secrets.DEV_RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.DEV_SUPABASE_KEY }}
          CEO_EMAIL: ${{ secrets.DEV_CEO_EMAIL }}
          ALLOWED_ORIGINS: '["http://localhost:3000"]'

  migrate:
    name: Push Migrations
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set environment secrets
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "SUPABASE_PROJECT_REF=${{ secrets.SUPABASE_PROJECT_REF }}" >> $GITHUB_ENV
            echo "SUPABASE_ACCESS_TOKEN=${{ secrets.SUPABASE_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "SUPABASE_PROJECT_REF=${{ secrets.DEV_SUPABASE_PROJECT_REF }}" >> $GITHUB_ENV
            echo "SUPABASE_ACCESS_TOKEN=${{ secrets.DEV_SUPABASE_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SUPABASE_DB_PASSWORD=${{ secrets.DEV_SUPABASE_DB_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --password $SUPABASE_DB_PASSWORD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: migrate
    if: github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
          else
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"
          fi
